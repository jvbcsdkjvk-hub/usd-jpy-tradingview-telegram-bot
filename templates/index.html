<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#08111f">
  <title>USD/JPY Signal Bot</title>
  <style>
    :root{color-scheme:dark;--bg:#08111f;--card:#111d2e;--line:#263750;--text:#e8eef7;--muted:#91a3bb;--long:#35d07f;--short:#ff6473;--wait:#f5c451}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#142842,var(--bg) 45%);color:var(--text);font:14px system-ui,"Yu Gothic UI",sans-serif}.wrap{max-width:1180px;margin:auto;padding:28px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px}.brand h1{margin:0;font-size:25px}.brand p{color:var(--muted);margin:5px 0}.hero{margin:24px 0;padding:25px;background:linear-gradient(135deg,#172842,#101a2a);border:1px solid var(--line);border-radius:18px;display:grid;grid-template-columns:1fr auto;gap:18px}.decision{font-size:44px;font-weight:800}.score{min-width:220px}.sentiment-labels{display:flex;justify-content:space-between;font-size:18px;font-weight:750}.sentiment-bar{display:flex;height:13px;border-radius:8px;overflow:hidden;background:#243247;margin-top:9px}.long-bar{background:var(--long)}.short-bar{background:var(--short)}.long{color:var(--long)}.short{color:var(--short)}.wait{color:var(--wait)}.trade-plan{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 8px}.trade-box{padding:12px;background:#0b1625;border:1px solid var(--line);border-radius:10px}.trade-box span{display:block;color:var(--muted);font-size:12px}.trade-box b{display:block;font-size:21px;margin-top:3px}.access{margin:-10px 0 20px;padding:12px 15px;border:1px solid var(--line);border-radius:10px;color:var(--muted);overflow-wrap:anywhere}.access a{color:#75b6ff}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}.card h2{margin:0 0 12px;font-size:19px}.metric{display:flex;justify-content:space-between;margin:7px 0;color:var(--muted);gap:12px}.metric b{color:var(--text);text-align:right}ul{padding-left:19px;margin:12px 0}li{margin:6px 0}.warn{color:var(--wait)}button{background:#277be8;color:white;border:0;border-radius:9px;padding:10px 15px;cursor:pointer}.foot{color:var(--muted);margin-top:20px;font-size:12px}
    @media(max-width:850px){.grid{grid-template-columns:1fr 1fr}}
    @media(max-width:520px){.wrap{padding:16px}.top{align-items:flex-start}.brand h1{font-size:21px}.hero{grid-template-columns:1fr;padding:18px;margin:16px 0}.decision{font-size:38px}.score{text-align:left}.trade-plan{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.metric{font-size:13px}}
  </style>
</head>
<body><main class="wrap">
  <div class="top"><div class="brand"><h1>USD/JPY Signal Bot</h1><p>{{ symbol }} · Technical + ICT</p></div><button onclick="refreshNow()">今すぐ更新</button></div>
  <section class="hero"><div><div id="decision" class="decision wait">LOADING</div><div id="detail">TradingViewデータを取得しています…</div></div><div class="score"><div id="score">--</div><small id="updated"></small></div></section>
  <div id="access" class="access">iPhone接続先を確認しています…</div>
  <div id="cards" class="grid"></div><p id="error" class="warn"></p>
  <p class="foot">分析支援ツールであり利益を保証しません。実発注は行いません。価格候補はATRベースの参考値です。</p>
</main>
<script>
const fmt=n=>Number(n).toFixed(3);
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function render(data){
  document.getElementById('error').textContent=data.error||'';
  document.getElementById('updated').textContent=data.updated_at?`更新 ${data.updated_at.replace('T',' ')}`:'';
  if(data.lan_url) document.getElementById('access').innerHTML=`iPhone（同じWi-Fi）: <a href="${esc(data.lan_url)}">${esc(data.lan_url)}</a>`;
  if(!data.result)return;
  const s=data.result.summary,d=s.decision.toLowerCase();
  const decision=document.getElementById('decision'); decision.textContent=s.decision; decision.className=`decision ${d}`;
  document.getElementById('score').innerHTML=`<div class="sentiment-labels"><span class="long">LONG ${s.long_percent}%</span><span class="short">SHORT ${s.short_percent}%</span></div><div class="sentiment-bar"><div class="long-bar" style="width:${s.long_percent}%"></div><div class="short-bar" style="width:${s.short_percent}%"></div></div>`;
  let details;
  if(s.decision==='WAIT'){
    details='LONGまたはSHORTが85％に達するまで価格候補は表示しません。';
  }else{
    details=`<div class="trade-plan"><div class="trade-box"><span>エントリー価格</span><b>${fmt(s.entry_price)}</b></div><div class="trade-box"><span>利確価格</span><b class="long">${fmt(s.take_profit_price)}</b></div><div class="trade-box"><span>損切り価格</span><b class="short">${fmt(s.stop_price)}</b></div></div><small>5分足ATR×1.5・リスクリワード ${esc(s.risk_reward)}</small>`;
  }
  if(s.blockers.length) details+=`<br><span class="warn">${s.blockers.map(esc).join(' ／ ')}</span>`;
  document.getElementById('detail').innerHTML=details;
  const order=['5m','1h','4h','1d'];
  document.getElementById('cards').innerHTML=order.filter(tf=>data.result.timeframes[tf]).map(tf=>{const a=data.result.timeframes[tf],m=a.metrics,cls=a.direction.toLowerCase();return `<article class="card"><h2>${tf} <span class="${cls}">${a.direction}</span></h2><div class="metric"><span>スコア</span><b>${a.score>0?'+':''}${a.score}</b></div><div class="metric"><span>RSI</span><b>${m.rsi.toFixed(1)}</b></div><div class="metric"><span>EMA 20 / 75 / 200</span><b>${fmt(m.ema20)} / ${fmt(m.ema75)} / ${fmt(m.ema200)}</b></div><div class="metric"><span>出来高比</span><b>${m.volume_ratio?m.volume_ratio.toFixed(2)+'x':'N/A'}</b></div><ul>${a.reasons.slice(0,6).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>${a.warnings.length?`<div class="warn">注意: ${a.warnings.map(esc).join(' / ')}</div>`:''}</article>`}).join('');
}
async function load(){try{render(await(await fetch('/api/status')).json())}catch(e){document.getElementById('error').textContent='画面更新に失敗しました'}}
async function refreshNow(){await fetch('/api/refresh',{method:'POST'});setTimeout(load,2000)}
load();setInterval(load,5000);
</script></body></html>
