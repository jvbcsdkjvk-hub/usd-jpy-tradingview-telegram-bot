name: USDJPY Telegram Signal

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
      slot:
        description: "Quarter-hour slot (0, 15, 30, 45)"
        required: false
        default: "0"
      mode:
        description: "auto, normal, or strong"
        required: false
        default: "auto"

permissions:
  contents: read

concurrency:
  group: usd-jpy-signal
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cloud.txt

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: .bot-state.json
          key: telegram-state-${{ github.run_id }}
          restore-keys: telegram-state-

      - name: Install dependency
        run: python -m pip install -r requirements-cloud.txt

      - name: Analyze and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_SLOT: ${{ inputs.slot }}
          NOTIFICATION_MODE: ${{ inputs.mode }}
        run: python telegram_signal.py
