name: USDJPY Telegram Signal

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: usd-jpy-signal
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cloud.txt

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: .bot-state.json
          key: telegram-state-${{ github.run_id }}
          restore-keys: telegram-state-

      - name: Install dependency
        run: python -m pip install -r requirements-cloud.txt

      - name: Analyze and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_signal.py

